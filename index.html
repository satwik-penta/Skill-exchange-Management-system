<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Peer Skill Exchange - Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
margin:0;
background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
position:relative;
overflow-y:auto;
}

body::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="80" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="50" r="1.5" fill="rgba(255,255,255,0.1)"/></svg>');
background-size:200px 200px;
animation: float 20s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
}

.login-box{
background: rgba(255,255,255,0.95);
backdrop-filter: blur(20px);
padding:50px;
width:100%;
max-width:450px;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.15);
text-align:center;
border:1px solid rgba(255,255,255,0.2);
position:relative;
z-index:10;
}

h1{
color:#1e3a8a;
margin-bottom:15px;
font-size:32px;
font-weight:700;
background: linear-gradient(45deg, #1e3a8a, #3b82f6);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

p{
color:#666;
font-size:18px;
margin-bottom:30px;
font-weight:500;
}

input{
width:100%;
padding:18px;
margin:12px 0;
border-radius:15px;
border:2px solid rgba(59,130,246,0.1);
font-size:16px;
transition: all 0.3s ease;
background: rgba(255,255,255,0.8);
}

input:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,0.1);
transform:translateY(-2px);
}

button{
width:100%;
padding:18px;
border:none;
color:white;
border-radius:15px;
font-size:18px;
cursor:pointer;
margin-top:15px;
transition: all 0.3s ease;
font-weight:600;
position:relative;
overflow:hidden;
}

button::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
transition: left 0.5s;
}

button:hover::before{
left:100%;
}

.login-btn{
background: linear-gradient(45deg, #3b82f6, #1d4ed8);
box-shadow:0 8px 25px rgba(59,130,246,0.3);
}

.login-btn:hover{
background: linear-gradient(45deg, #1d4ed8, #1e40af);
transform:translateY(-3px);
box-shadow:0 12px 35px rgba(59,130,246,0.4);
}

.register-btn{
background: linear-gradient(45deg, #10b981, #059669);
box-shadow:0 8px 25px rgba(16,185,129,0.3);
}

.register-btn:hover{
background: linear-gradient(45deg, #059669, #047857);
transform:translateY(-3px);
box-shadow:0 12px 35px rgba(16,185,129,0.4);
}

</style>
</head>

<body>

<div class="login-box">

<h1><i class="fas fa-exchange-alt"></i> Peer Skill Exchange</h1>

<p>Login to continue</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email address"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<button type="submit" class="login-btn">
Login
</button>

<button
type="button"
class="register-btn"
onclick="goRegister()"
>
Create Account
</button>

<div style="margin-top: 20px;">
  <p>Or login with:</p>
  <button type="button" onclick="loginGoogle()" style="background: #db4437; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 5px; cursor: pointer;">
    <i class="fab fa-google"></i> Google
  </button>
  <button type="button" onclick="loginGitHub()" style="background: #24292e; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 5px; cursor: pointer;">
    <i class="fab fa-github"></i> GitHub
  </button>
</div>

</form>

</div>


<script>

document.getElementById("loginForm").addEventListener("submit",async e=>{

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const res=await fetch("/api/users/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email,password})

});

const data = await res.json();

if(res.ok){

localStorage.setItem("userEmail",email);

window.location="dashboard.html";

}else{

alert(data.message || "Login failed");

}

});


function goRegister(){

window.location="createProfile.html";

}

function loginGoogle() {
  window.location = "/auth/google";
}

function loginGitHub() {
  window.location = "/auth/github";
}

</script>

</body>
</html>
