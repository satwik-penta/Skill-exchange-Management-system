<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Peer Skill Exchange</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .message {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            color: #666;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Email Verification</h1>
        <div id="message" class="message">
            Verifying your email address...
        </div>
        <div id="status" class="status"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            Processing...
        </div>
        <a href="/" class="btn" id="homeBtn" style="display: none;">Go to Home</a>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showError('Invalid verification link');
            return;
        }

        // Show loading
        document.getElementById('loading').style.display = 'block';

        // Verify email
        fetch('/api/verify-email', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ token })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            
            if (data.message === 'Email verified successfully') {
                showSuccess('Your email has been verified successfully! You can now log in to your account.');
                document.getElementById('homeBtn').style.display = 'inline-block';
            } else {
                showError(data.message || 'Verification failed');
            }
        })
        .catch(error => {
            document.getElementById('loading').style.display = 'none';
            showError('Network error. Please try again.');
            console.error('Error:', error);
        });

        function showSuccess(message) {
            document.getElementById('message').textContent = message;
            const status = document.getElementById('status');
            status.textContent = '✓ Email Verified';
            status.className = 'status success';
            status.style.display = 'block';
        }

        function showError(message) {
            document.getElementById('message').textContent = message;
            const status = document.getElementById('status');
            status.textContent = '✗ Verification Failed';
            status.className = 'status error';
            status.style.display = 'block';
        }
    </script>
</body>
</html>
