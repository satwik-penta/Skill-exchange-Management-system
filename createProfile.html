<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Profile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
body{margin:0;background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); min-height:100vh; position:relative; overflow-x:hidden; overflow-y:auto;}

body::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="80" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="50" r="1.5" fill="rgba(255,255,255,0.1)"/></svg>');
background-size:200px 200px;
animation: float 20s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
}

header{
background: rgba(255,255,255,0.95);
backdrop-filter: blur(20px);
padding:20px;
box-shadow:0 8px 32px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.2);
position:relative;
z-index:10;
}

h1{color:#1e3a8a; background: linear-gradient(45deg, #1e3a8a, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight:700;}

.container{
max-width:900px;
margin:40px auto;
padding:20px;
position:relative;
z-index:5;
}

form{
background: rgba(255,255,255,0.95);
backdrop-filter: blur(20px);
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
border:1px solid rgba(255,255,255,0.2);
}

h2{
color:#1e3a8a;
font-size:24px;
margin-bottom:20px;
font-weight:600;
}

input,textarea,select{
width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:2px solid rgba(59,130,246,0.1);
font-size:16px;
transition: all 0.3s ease;
background: rgba(255,255,255,0.8);
}

input:focus,textarea:focus,select:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,0.1);
transform:translateY(-2px);
}

button{
padding:14px 28px;
background: linear-gradient(45deg, #3b82f6, #1d4ed8);
border:none;
color:white;
border-radius:12px;
cursor:pointer;
margin:15px 5px 0 0;
transition: all 0.3s ease;
font-size:16px;
font-weight:600;
box-shadow:0 6px 20px rgba(59,130,246,0.3);
position:relative;
overflow:hidden;
}

button::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
transition: left 0.5s;
}

button:hover::before{
left:100%;
}

button:hover{
background: linear-gradient(45deg, #1d4ed8, #1e40af);
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(59,130,246,0.4);
}

.skill-tag{
background: linear-gradient(45deg, #3b82f6, #1d4ed8);
color:white;
padding:8px 16px;
border-radius:25px;
margin:6px;
display:inline-block;
font-size:14px;
font-weight:500;
transition: all 0.3s ease;
cursor:pointer;
box-shadow:0 4px 15px rgba(59,130,246,0.2);
}

.skill-tag:hover{
transform: translateY(-2px);
box-shadow:0 6px 20px rgba(59,130,246,0.3);
background: linear-gradient(45deg, #1d4ed8, #1e40af);
}
</style>
</head>

<body>

<header>
<h1>Create Profile</h1>
<button onclick="window.location='dashboard.html'">Dashboard</button>
</header>

<div class="container">

<form id="profileForm">

<h2>Basic Information</h2>

<input id="firstName" placeholder="First Name" required>
<input id="lastName" placeholder="Last Name" required>
<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>
<input id="phone" placeholder="Phone Number">
<input id="location" placeholder="Location">
<textarea id="bio" placeholder="Short Bio"></textarea>

<h2>Social Links</h2>

<input id="linkedin" placeholder="LinkedIn Profile URL">
<input id="github" placeholder="GitHub Profile URL">
<input id="portfolio" placeholder="Portfolio Website URL">

<h2>Education & Experience</h2>

<select id="qualification">
<option value="">Select Qualification</option>
<option>10th</option>
<option>12th</option>
<option>Diploma</option>
<option>B.Tech</option>
<option>M.Tech</option>
<option>B.Sc</option>
<option>M.Sc</option>
<option>PhD</option>
</select>

<input id="experience" type="number" placeholder="Years of Experience">
<textarea id="previousCompanies" placeholder="Previous Companies (one per line)"></textarea>

<h2>Profile Picture</h2>

<input type="file" id="profilePicture" accept="image/png,image/jpeg,image/jpg,image/webp">

<h2>Certificates</h2>

<input type="file" id="certificates" multiple accept="image/png,image/jpeg,image/jpg,image/webp">

<h2>Add Skills</h2>

<select id="skillDropdown">
<option>Java</option>
<option>Python</option>
<option>JavaScript</option>
<option>C</option>
<option>C++</option>
<option>React</option>
<option>Node.js</option>
<option>Cybersecurity</option>
<option>Machine Learning</option>
<option>Data Science</option>
<option>Cloud Computing</option>
<option>Docker</option>
<option>Linux</option>
</select>

<select id="skillLevel">
<option value="Beginner">Beginner</option>
<option value="Intermediate">Intermediate</option>
<option value="Expert">Expert</option>
</select>

<button type="button" onclick="addSkill()">Add Skill</button>

<div id="skillsBox"></div>

<button type="submit">Create Profile</button>

</form>

</div>

<script>

const API="http://localhost:5000/api/users";
let skills=[];

function addSkill(){

const skill=document.getElementById("skillDropdown").value;
const level=document.getElementById("skillLevel").value;

if(!skills.some(s => s.name === skill)){
skills.push({name: skill, level: level});
renderSkills();
}

}

function renderSkills(){

const box=document.getElementById("skillsBox");

box.innerHTML = skills.map(s =>
`<span class="skill-tag">${s.name} (${s.level})</span>`
).join("");

}

document.getElementById("profileForm").addEventListener("submit",async function(e){

e.preventDefault();

const firstName=document.getElementById("firstName").value;
const lastName=document.getElementById("lastName").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
const phone=document.getElementById("phone").value;
const location=document.getElementById("location").value;
const bio=document.getElementById("bio").value;
const linkedin=document.getElementById("linkedin").value;
const github=document.getElementById("github").value;
const portfolio=document.getElementById("portfolio").value;
const qualification=document.getElementById("qualification").value;
const experience=document.getElementById("experience").value;
const previousCompanies=document.getElementById("previousCompanies").value;

const fd=new FormData();

fd.append("firstName",firstName);
fd.append("lastName",lastName);
fd.append("email",email);
fd.append("password",password);
fd.append("phone",phone);
fd.append("location",location);
fd.append("bio",bio);
fd.append("linkedin",linkedin);
fd.append("github",github);
fd.append("portfolio",portfolio);
fd.append("qualification",qualification);
fd.append("experience",experience || 0);
fd.append("previousCompanies",previousCompanies);
fd.append("skills",JSON.stringify(skills || []));

const pic=document.getElementById("profilePicture").files[0];

if(pic){
fd.append("profilePicture",pic);
}

const certs=document.getElementById("certificates").files;

for(let f of certs){
fd.append("certificates",f);
}

try{

const res = await fetch(API,{
method:"POST",
body:fd
});

const data = await res.json();

if(res.ok){

alert(data.message || "Profile created successfully. Please check your email to verify your account.");

localStorage.setItem("userEmail",email);

window.location="dashboard.html";

}else{

alert(data.message || "Failed to create profile");

}

}catch(err){

console.error(err);
alert("Server error");

}

});

</script>

</body>
</html>
