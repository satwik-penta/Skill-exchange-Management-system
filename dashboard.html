<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard - Peer Skill Exchange</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
margin:0;
background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
min-height:100vh;
position:relative;
overflow-x:hidden;
overflow-y:auto;
}

body::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="80" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="50" r="1.5" fill="rgba(255,255,255,0.1)"/></svg>');
background-size:200px 200px;
animation: float 20s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
}

header{
background: rgba(255,255,255,0.95);
backdrop-filter: blur(20px);
padding:20px;
box-shadow:0 8px 32px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.2);
position:relative;
z-index:10;
}

h1{
color:#1e3a8a;
background: linear-gradient(45deg, #1e3a8a, #3b82f6);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
font-weight:700;
margin:0;
font-size:28px;
}

.container{
max-width:1000px;
margin:60px auto;
padding:20px;
text-align:center;
position:relative;
z-index:5;
}

h2{
color:white;
font-size:36px;
margin-bottom:10px;
font-weight:700;
text-shadow:0 2px 10px rgba(0,0,0,0.3);
}

p{
color:rgba(255,255,255,0.9);
font-size:18px;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background: rgba(255,255,255,0.95);
backdrop-filter: blur(20px);
padding:40px 25px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
cursor:pointer;
transition: all 0.4s ease;
border:1px solid rgba(255,255,255,0.2);
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
transition: left 0.6s;
}

.card:hover::before{
left:100%;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 25px 60px rgba(0,0,0,0.2);
}

.card h2{
margin-bottom:15px;
color:#1e3a8a;
font-size:22px;
font-weight:600;
}

.card p{
color:#666;
font-size:14px;
line-height:1.5;
}

.card i{
font-size:48px;
color:#3b82f6;
margin-bottom:20px;
transition: all 0.3s ease;
}

.card:hover i{
transform: scale(1.1);
color:#1d4ed8;
}

.logout{
background: linear-gradient(45deg, #ef4444, #dc2626);
border:none;
color:white;
padding:12px 24px;
border-radius:12px;
cursor:pointer;
transition: all 0.3s ease;
font-size:16px;
font-weight:600;
box-shadow:0 6px 20px rgba(239,68,68,0.3);
position:relative;
overflow:hidden;
}

.logout::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
transition: left 0.5s;
}

.logout:hover::before{
left:100%;
}

.logout:hover{
background: linear-gradient(45deg, #dc2626, #b91c1c);
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(239,68,68,0.4);
}

</style>
</head>

<body>

<header>

<h1>Peer Skill Exchange</h1>

<button class="logout" onclick="logout()">
Logout
</button>

</header>

<div class="container">

<h2>Welcome</h2>

<p>Select an option</p>

<div class="cards">

<div class="card" onclick="goCreateProfile()">
<i class="fas fa-user-plus"></i>
<h2>Create Profile</h2>
<p>Setup your skills and experience</p>
</div>

<div class="card" onclick="goSearch()">
<i class="fas fa-search"></i>
<h2>Search Skills</h2>
<p>Find people with specific skills</p>
</div>

<div class="card" onclick="goProfile()">
<i class="fas fa-user"></i>
<h2>My Profile</h2>
<p>View your profile</p>
</div>

<div class="card" onclick="goRequests()">
<i class="fas fa-envelope"></i>
<h2>Exchange Requests</h2>
<p>View incoming skill exchange requests</p>
</div>

<div class="card" onclick="goSentRequests()">
<i class="fas fa-paper-plane"></i>
<h2>Sent Requests</h2>
<p>View requests you have sent</p>
</div>

</div>

</div>

<script>

async function checkAuth() {
  const userEmail = localStorage.getItem("userEmail");
  if (!userEmail) {
    // Check if logged in via OAuth
    try {
      const res = await fetch('/api/users/me');
      if (res.ok) {
        const user = await res.json();
        localStorage.setItem("userEmail", user.email);
        // Optionally store more user data
      } else {
        window.location = "index.html";
      }
    } catch (err) {
      window.location = "index.html";
    }
  }
}

checkAuth();

function logout(){
localStorage.removeItem("userEmail");
window.location="index.html";
}

function goCreateProfile(){
window.location="createProfile.html";
}

function goSearch(){
window.location="search.html";
}

function goProfile(){
window.location="profile.html";
}

function goRequests(){
window.location="requests.html";
}

function goSentRequests(){
window.location="sentRequests.html";
}

</script>

</body>
</html>
